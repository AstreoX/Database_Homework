<svg width="600" height="340" viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#0D1117" rx="10"/>
  
  <!-- 标题栏 -->
  <rect width="100%" height="30" fill="#21262D" rx="10"/>
  <circle cx="20" cy="15" r="5" fill="#FF5F56"/>
  <circle cx="40" cy="15" r="5" fill="#FFBD2E"/>
  <circle cx="60" cy="15" r="5" fill="#27C93F"/>
  <text x="300" y="20" font-family="monospace" font-size="12" fill="#8B949E" text-anchor="middle">psql — student@postgres_db</text>

  <g font-family="Consolas, 'Courier New', monospace" font-size="14">
    <!-- 第一行: psql 登录 -->
    <g opacity="0">
      <text x="20" y="65" fill="#7EE787" font-weight="bold">user@db-lab:~$</text>
      <text x="140" y="65" fill="#58A6FF">psql -h localhost -U student -d lab_db</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.5s" fill="freeze" />
    </g>

    <!-- 第二行: Postgres 版本信息 -->
    <g opacity="0">
      <text x="20" y="90" fill="#8B949E">psql (15.3), server (15.3, Debian 15.3-1.pgdg110+1)</text>
      <text x="20" y="110" fill="#8B949E">Type "help" for help.</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.2s" fill="freeze" />
    </g>

    <!-- 第三行: SQL 查询语句 -->
    <g opacity="0">
      <text x="20" y="140" fill="#336791" font-weight="bold">lab_db=&gt;</text>
      <text x="90" y="140" fill="#C9D1D9">SELECT * FROM lab_milestones;</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="2s" fill="freeze" />
    </g>

    <!-- 表格部分 -->
    <g opacity="0" fill="#C9D1D9" font-size="12">
      <text x="20" y="165"> id |      topic       |  status  </text>
      <text x="20" y="175">----+------------------+----------</text>
      <text x="20" y="195">  1 | SQL Fundamentals | [DONE]   </text>
      <text x="20" y="215">  2 | Schema Design    | [DONE]   </text>
      <text x="20" y="235">  3 | Relational Calc  | [DOING]  </text>
      <text x="20" y="255">  4 | Final Project    | [TODO]   </text>
      <text x="20" y="275">(4 rows)</text>
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3s" fill="freeze" />
    </g>

    <!-- 闪烁光标 -->
    <g opacity="0">
      <text x="20" y="305" fill="#336791" font-weight="bold">lab_db=&gt;</text>
      <rect x="90" y="293" width="8" height="15" fill="#58A6FF">
        <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" />
      </rect>
      <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="3.5s" fill="freeze" />
    </g>
  </g>
</svg>
